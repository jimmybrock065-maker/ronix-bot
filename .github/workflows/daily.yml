name: RONIX Daily Predictions

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Set up Python
        uses: actions/setup-python@42375524b29f31b0d5e3ce9dd498d5a73ed4d5f1
        with:
          python-version: '3.10'
          
      - name: Install libraries
        run: pip install pyTelegramBotAPI requests pandas
        
      - name: Run RONIX
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python3 ronix_bot.py
